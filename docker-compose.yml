version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - server

  server:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - RPC_URL=https://base-sepolia-rpc.skalenetwork.com/l2
      - CHAIN_ID=571424340
